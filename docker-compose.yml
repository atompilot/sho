services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sho}
      POSTGRES_USER: ${POSTGRES_USER:-sho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sho}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sho-api:
    build: ./sho-api
    ports:
      - "${API_PORT:-15080}:${API_PORT:-15080}"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sho}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sho}?sslmode=disable
      API_PORT: ${API_PORT:-15080}
    depends_on:
      postgres:
        condition: service_healthy

  sho-web:
    build: ./sho-web
    ports:
      - "15030:3000"
    environment:
      API_URL: http://sho-api:${API_PORT:-15080}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:15080}
    depends_on:
      - sho-api

volumes:
  postgres_data:
