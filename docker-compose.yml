services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sho
      POSTGRES_USER: sho
      POSTGRES_PASSWORD: sho_dev_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sho"]
      interval: 5s
      timeout: 5s
      retries: 5

  sho-api:
    build: ./sho-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://sho:sho_dev_password@postgres:5432/sho?sslmode=disable
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
