services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sho
      POSTGRES_USER: sho
      POSTGRES_PASSWORD: sho_dev_password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sho"]
      interval: 5s
      timeout: 5s
      retries: 5

  sho-api:
    build: ./sho-api
    ports:
      - "15080:15080"
    environment:
      DATABASE_URL: postgres://sho:sho_dev_password@postgres:5432/sho?sslmode=disable
      PORT: 15080
    depends_on:
      postgres:
        condition: service_healthy

  sho-web:
    build: ./sho-web
    ports:
      - "15030:3000"
    environment:
      API_URL: http://sho-api:15080
      NEXT_PUBLIC_API_URL: http://localhost:15080
    depends_on:
      - sho-api

volumes:
  postgres_data:
