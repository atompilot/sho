services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sho}
      POSTGRES_USER: ${POSTGRES_USER:-sho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sho}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sho-api:
    build: ./sho-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sho}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sho}?sslmode=disable
      API_PORT: "15080"
      API_BASE_URL: https://sho.splaz.cn
      CORS_ALLOW_ORIGIN: https://sho.splaz.cn
      MAX_CONTENT_BYTES: ${MAX_CONTENT_BYTES:-5242880}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
    depends_on:
      postgres:
        condition: service_healthy

  sho-web:
    build:
      context: ./sho-web
      args:
        - NEXT_PUBLIC_API_URL=https://sho.splaz.cn
    restart: unless-stopped
    environment:
      API_URL: http://sho-api:15080
      NEXT_PUBLIC_API_URL: https://sho.splaz.cn
    depends_on:
      - sho-api

  caddy:
    build:
      context: ./deploy
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "443:443"
      - "15443:15443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      ALICLOUD_ACCESS_KEY: ${ALICLOUD_ACCESS_KEY}
      ALICLOUD_SECRET_KEY: ${ALICLOUD_SECRET_KEY}
    depends_on:
      - sho-web
      - sho-api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
