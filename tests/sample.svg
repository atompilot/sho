<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)" rx="20" />

  <!-- Glow -->
  <circle cx="200" cy="200" r="140" fill="url(#glow)" />

  <!-- Orbit rings -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="#4f46e5" stroke-width="1" stroke-dasharray="4 4" opacity="0.5" />
  <circle cx="200" cy="200" r="140" fill="none" stroke="#4f46e5" stroke-width="1" stroke-dasharray="6 6" opacity="0.3" />

  <!-- Center star -->
  <circle cx="200" cy="200" r="30" fill="#6366f1" />
  <circle cx="200" cy="200" r="20" fill="#818cf8" />
  <circle cx="200" cy="200" r="10" fill="#c7d2fe" />

  <!-- Orbiting dots -->
  <circle cx="300" cy="200" r="8" fill="#f472b6" />
  <circle cx="200" cy="100" r="6" fill="#34d399" />
  <circle cx="130" cy="270" r="7" fill="#fbbf24" />
  <circle cx="270" cy="310" r="5" fill="#60a5fa" />

  <!-- Stars -->
  <circle cx="50"  cy="50"  r="1.5" fill="white" opacity="0.8" />
  <circle cx="120" cy="30"  r="1"   fill="white" opacity="0.6" />
  <circle cx="350" cy="80"  r="2"   fill="white" opacity="0.9" />
  <circle cx="380" cy="150" r="1.5" fill="white" opacity="0.7" />
  <circle cx="30"  cy="300" r="1"   fill="white" opacity="0.5" />
  <circle cx="370" cy="350" r="2"   fill="white" opacity="0.8" />
  <circle cx="80"  cy="370" r="1.5" fill="white" opacity="0.6" />

  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">SVG Sample</text>
</svg>
