<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Sample</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 640px;
      margin: 60px auto;
      padding: 0 24px;
      color: #111;
      line-height: 1.6;
    }
    h1 { font-size: 2rem; margin-bottom: 8px; }
    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
    }
    button {
      background: #111;
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #333; }
    #counter { font-size: 3rem; font-weight: bold; text-align: center; margin: 16px 0; }
  </style>
</head>
<body>
  <h1>HTML Sample Page</h1>
  <p>A simple interactive page demonstrating basic HTML, CSS, and JavaScript.</p>

  <div class="card">
    <h2>Counter</h2>
    <div id="counter">0</div>
    <div style="display:flex;gap:8px;justify-content:center">
      <button onclick="change(-1)">−</button>
      <button onclick="change(1)">+</button>
      <button onclick="reset()">Reset</button>
    </div>
  </div>

  <div class="card">
    <h2>Color Palette</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div style="width:48px;height:48px;background:#ef4444;border-radius:8px"></div>
      <div style="width:48px;height:48px;background:#f97316;border-radius:8px"></div>
      <div style="width:48px;height:48px;background:#eab308;border-radius:8px"></div>
      <div style="width:48px;height:48px;background:#22c55e;border-radius:8px"></div>
      <div style="width:48px;height:48px;background:#3b82f6;border-radius:8px"></div>
      <div style="width:48px;height:48px;background:#8b5cf6;border-radius:8px"></div>
    </div>
  </div>

  <script>
    let count = 0;
    function change(delta) {
      count += delta;
      document.getElementById('counter').textContent = count;
    }
    function reset() {
      count = 0;
      document.getElementById('counter').textContent = 0;
    }
  </script>
</body>
</html>
